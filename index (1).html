<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calculadora de Equações do 2º Grau</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo animado */
        .math-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-equation {
            position: absolute;
            color: rgba(255, 255, 255, 0.08);
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: nowrap;
            animation: float linear infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes float {
            from {
                transform: translateY(-100vh) rotate(0deg);
            }
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* Container principal */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* Conteúdo principal */
        .content {
            width: 100%;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin-bottom: 20px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
            font-family: 'Courier New', monospace;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* Área de entrada */
        .input-area {
            padding: 24px;
        }

        .equation-input {
            background: #f7fafc;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .equation-input:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .equation-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 18px;
        }

        #equationField {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            outline: none;
            color: #2d3748;
            text-align: center;
        }

        #equationField::placeholder {
            color: #a0aec0;
            font-size: 18px;
        }

        /* Teclado matemático */
        .math-keyboard {
            background: #edf2f7;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
        }

        .keyboard-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .math-key {
            background: white;
            border: 2px solid #cbd5e0;
            border-radius: 12px;
            padding: 12px 8px;
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .math-key:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .math-key:active {
            transform: translateY(0);
        }

        .math-key.special {
            background: #667eea;
            color: white;
            border-color: #5a67d8;
        }

        .math-key.wide {
            grid-column: span 2;
        }

        /* Botões */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        /* Mensagem de erro */
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 16px;
            border-radius: 16px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        /* Solução */
        .solution-area {
            padding: 24px;
        }

        .solution-card {
            background: #f7fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 6px solid #667eea;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .equation-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            font-size: 28px;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .step-title {
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-explanation {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid #e2e8f0;
        }

        .step-explanation p {
            margin-bottom: 8px;
            line-height: 1.6;
            color: #4a5568;
        }

        .formula-box {
            background: #667eea10;
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            text-align: center;
            font-weight: 500;
        }

        .result-highlight {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Estilo para as raízes */
        .roots-detailed {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #667eea;
        }

        .root-calculation {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .root-calculation:last-child {
            margin-bottom: 0;
        }

        .root-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        .root-icon {
            width: 40px;
            height: 40px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .root-icon.x1 {
            background: #48bb78;
        }

        .root-icon.x2 {
            background: #f56565;
        }

        .root-expression {
            background: #edf2f7;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            text-align: center;
            margin: 12px 0;
        }

        .root-result-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .root-result-item {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 2px solid #667eea;
        }

        .root-value-decimal {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }

        .root-value-fraction {
            font-size: 20px;
            color: #667eea;
            font-weight: 600;
            background: white;
            padding: 8px;
            border-radius: 8px;
            display: inline-block;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 18px;
        }

        .fraction .numerator {
            border-bottom: 2px solid currentColor;
            padding: 0 4px;
        }

        .fraction .denominator {
            padding: 0 4px;
        }

        /* Histórico */
        .history-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        .history-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
        }

        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #edf2f7;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .history-item {
            background: #f7fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .history-item:hover {
            border-color: #667eea;
            transform: translateX(-5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .history-equation {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .history-result {
            font-size: 14px;
            color: #48bb78;
            font-weight: 500;
        }

        .history-roots {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }

        .history-date {
            font-size: 10px;
            color: #a0aec0;
            margin-top: 4px;
            text-align: right;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #718096;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.3s ease;
        }

        .btn-icon:hover {
            color: #667eea;
        }

        .empty-history {
            text-align: center;
            color: #a0aec0;
            padding: 40px 20px;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .history-sidebar {
                position: static;
                margin-top: 20px;
            }

            .keyboard-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            #equationField {
                font-size: 20px;
            }

            .root-result-box {
                grid-template-columns: 1fr;
            }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Destaque */
        .highlight {
            background: #fef3c7;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
            color: #92400e;
        }

        /* Fração */
        .frac {
            display: inline-block;
            text-align: center;
            vertical-align: middle;
        }
        .frac > span {
            display: block;
            padding: 0 0.1em;
        }
        .frac span.bottom {
            border-top: 2px solid currentColor;
        }
    </style>
</head>
<body>
    <div class="math-background" id="mathBackground"></div>

    <div class="main-container">
        <!-- Conteúdo principal -->
        <div class="content">
            <div class="card">
                <div class="header">
                    <h1>🧮 Calculadora de Equações do 2º Grau</h1>
                    <p>ax² + bx + c = 0</p>
                </div>

                <div class="input-area">
                    <!-- Campo de equação -->
                    <div class="equation-input">
                        <div class="equation-label">
                            <span>📝</span>
                            <span>Digite a equação completa:</span>
                        </div>
                        <input 
                            type="text" 
                            id="equationField" 
                            placeholder="Ex: 2x² + 7x - 8 = 0 ou 2x^2 + 7x - 8 = 0"
                            value=""
                        >
                    </div>

                    <!-- Teclado matemático -->
                    <div class="math-keyboard">
                        <div class="keyboard-title">
                            <span>⌨️</span>
                            <span>Teclado Matemático</span>
                        </div>
                        <div class="keyboard-grid">
                            <button class="math-key" onclick="insertSymbol('x²')">x²</button>
                            <button class="math-key" onclick="insertSymbol('x^2')">x^2</button>
                            <button class="math-key" onclick="insertSymbol('x')">x</button>
                            <button class="math-key" onclick="insertSymbol('+')">+</button>
                            <button class="math-key" onclick="insertSymbol('-')">−</button>
                            <button class="math-key" onclick="insertSymbol('×')">×</button>
                            <button class="math-key" onclick="insertSymbol('÷')">÷</button>
                            <button class="math-key" onclick="insertSymbol('(')">(</button>
                            <button class="math-key" onclick="insertSymbol(')')">)</button>
                            <button class="math-key" onclick="insertSymbol('=')">=</button>
                            <button class="math-key" onclick="insertSymbol('0')">0</button>
                            <button class="math-key" onclick="insertSymbol('1')">1</button>
                            <button class="math-key" onclick="insertSymbol('2')">2</button>
                            <button class="math-key" onclick="insertSymbol('3')">3</button>
                            <button class="math-key" onclick="insertSymbol('4')">4</button>
                            <button class="math-key" onclick="insertSymbol('5')">5</button>
                            <button class="math-key" onclick="insertSymbol('6')">6</button>
                            <button class="math-key" onclick="insertSymbol('7')">7</button>
                            <button class="math-key" onclick="insertSymbol('8')">8</button>
                            <button class="math-key" onclick="insertSymbol('9')">9</button>
                            <button class="math-key special wide" onclick="insertSymbol('.')">.</button>
                            <button class="math-key special" onclick="clearEquation()">⌫</button>
                        </div>
                    </div>

                    <!-- Botões de ação -->
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="calcular()">
                            <span>🔍</span>
                            <span>Resolver</span>
                        </button>
                        <button class="btn btn-secondary" onclick="limparCampos()">
                            <span>🧹</span>
                            <span>Limpar</span>
                        </button>
                    </div>

                    <!-- Mensagem de erro -->
                    <div id="errorMessage" class="error-message" style="display: none;">
                        <span>⚠️</span>
                        <span id="errorText"></span>
                    </div>
                </div>

                <!-- Área de solução -->
                <div id="solutionArea" class="solution-area" style="display: none;">
                    <div id="solutionContent"></div>
                </div>
            </div>
        </div>

        <!-- Histórico -->
        <div class="history-sidebar">
            <div class="history-header">
                <div class="history-title">
                    <span>📋</span>
                    <span>Histórico</span>
                </div>
                <button class="btn-icon" onclick="limparHistorico()" title="Limpar histórico">🗑️</button>
            </div>
            <div id="historyList" class="history-list">
                <div class="empty-history">
                    Nenhum cálculo ainda<br>
                    Resolva uma equação para começar!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lista de equações para o fundo animado
        const equations = [
            "x² + 5x + 6 = 0", "2x² - 8x + 6 = 0", "x² - 4 = 0", "3x² + 2x - 1 = 0",
            "x² - 6x + 9 = 0", "4x² - 12x + 9 = 0", "x² + 2x - 15 = 0", "5x² - 20 = 0",
            "x² - 7x + 12 = 0", "2x² + 5x - 3 = 0", "x² - 9x + 14 = 0", "3x² - 4x + 1 = 0",
            "x² + 6x + 8 = 0", "2x² - 5x - 3 = 0", "x² - 2x - 8 = 0", "4x² - 8x + 3 = 0"
        ];

        // Array para armazenar histórico
        let historico = JSON.parse(localStorage.getItem('historicoEquacoes')) || [];

        // Criar fundo animado
        function createMathBackground() {
            const background = document.getElementById('mathBackground');
            for (let i = 0; i < 20; i++) {
                const equation = document.createElement('div');
                equation.className = 'floating-equation';
                equation.textContent = equations[Math.floor(Math.random() * equations.length)];
                equation.style.left = Math.random() * 100 + '%';
                equation.style.animationDuration = (Math.random() * 10 + 15) + 's';
                equation.style.animationDelay = Math.random() * 10 + 's';
                equation.style.opacity = Math.random() * 0.15 + 0.05;
                background.appendChild(equation);
            }
        }

        // Função para converter decimal em fração
        function decimalParaFracao(decimal) {
            // Tolerância para erros de arredondamento
            const tolerancia = 1.0e-6;
            
            // Se for inteiro
            if (Math.abs(decimal - Math.round(decimal)) < tolerancia) {
                return { numerador: Math.round(decimal), denominador: 1 };
            }
            
            let numerador = 1;
            let denominador = 1;
            let melhorErro = Math.abs(decimal - numerador/denominador);
            
            // Buscar fração mais próxima (limitando denominador até 100)
            for (let d = 1; d <= 100; d++) {
                let n = Math.round(decimal * d);
                let erro = Math.abs(decimal - n/d);
                
                if (erro < melhorErro && erro < tolerancia) {
                    numerador = n;
                    denominador = d;
                    melhorErro = erro;
                }
            }
            
            // Simplificar fração
            return simplificarFracao(numerador, denominador);
        }

        // Função para simplificar fração
        function simplificarFracao(numerador, denominador) {
            const mdc = calcularMDC(Math.abs(numerador), Math.abs(denominador));
            return {
                numerador: numerador / mdc,
                denominador: denominador / mdc
            };
        }

        // Função para calcular MDC
        function calcularMDC(a, b) {
            while (b !== 0) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        // Função para formatar fração em HTML
        function formatarFracaoHTML(fracao) {
            if (fracao.denominador === 1) {
                return fracao.numerador.toString();
            }
            if (fracao.numerador < 0 || fracao.denominador < 0) {
                const absNum = Math.abs(fracao.numerador);
                const absDen = Math.abs(fracao.denominador);
                return `-<span class="frac"><span>${absNum}</span><span class="bottom">${absDen}</span></span>`;
            }
            return `<span class="frac"><span>${fracao.numerador}</span><span class="bottom">${fracao.denominador}</span></span>`;
        }

        // Função para calcular raiz quadrada de fração
        function calcularRaizFracao(delta, a) {
            // Para delta = 81, a = 3, a raiz seria 9/3 = 3
            const raizDelta = Math.sqrt(Math.abs(delta));
            
            // Se a raiz for inteira
            if (Math.abs(raizDelta - Math.round(raizDelta)) < 1.0e-10) {
                return {
                    numerador: Math.round(raizDelta),
                    denominador: 1,
                    tipo: 'inteiro'
                };
            }
            
            // Tentar simplificar a raiz (ex: √12 = 2√3)
            let valor = Math.abs(delta);
            let fatorFora = 1;
            let fatorDentro = 1;
            
            for (let i = 2; i <= Math.sqrt(valor); i++) {
                while (valor % (i * i) === 0) {
                    fatorFora *= i;
                    valor /= (i * i);
                }
            }
            fatorDentro = valor;
            
            return {
                fatorFora: fatorFora,
                fatorDentro: fatorDentro,
                tipo: 'radical'
            };
        }

        // Inserir símbolo no campo
        function insertSymbol(symbol) {
            const field = document.getElementById('equationField');
            const start = field.selectionStart;
            const end = field.selectionEnd;
            const text = field.value;
            
            let insertText = symbol;
            if (symbol === 'x²') insertText = 'x²';
            else if (symbol === 'x^2') insertText = 'x^2';
            
            field.value = text.substring(0, start) + insertText + text.substring(end);
            field.focus();
            field.setSelectionRange(start + insertText.length, start + insertText.length);
        }

        // Limpar campo
        function clearEquation() {
            const field = document.getElementById('equationField');
            const start = field.selectionStart;
            const end = field.selectionEnd;
            
            if (start === end && start > 0) {
                // Apagar caractere anterior
                field.value = field.value.substring(0, start - 1) + field.value.substring(end);
                field.setSelectionRange(start - 1, start - 1);
            } else if (start !== end) {
                // Apagar seleção
                field.value = field.value.substring(0, start) + field.value.substring(end);
                field.setSelectionRange(start, start);
            }
        }

        // Limpar todos os campos
        function limparCampos() {
            document.getElementById('equationField').value = '';
            document.getElementById('solutionArea').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Extrair coeficientes da equação
        function extrairCoeficientes(equacao) {
            // Remover espaços e converter para minúsculas
            let eq = equacao.toLowerCase().replace(/\s/g, '');
            
            // Verificar se tem = 0
            if (!eq.includes('=0')) {
                if (eq.includes('=')) {
                    // Se tem = mas não é =0, reorganizar
                    const partes = eq.split('=');
                    eq = partes[0] + '-' + partes[1] + '=0';
                } else {
                    eq += '=0';
                }
            }
            
            // Remover =0 do final
            eq = eq.replace('=0', '');
            
            // Padronizar x² e x^2 para x2
            eq = eq.replace(/x²/g, 'x2').replace(/x\^2/g, 'x2');
            
            // Extrair coeficientes usando regex
            let a = 0, b = 0, c = 0;
            
            // Encontrar termo x²
            const termoA = eq.match(/([+-]?\d*\.?\d*)x2/);
            if (termoA) {
                a = termoA[1] === '' || termoA[1] === '+' ? 1 : 
                    termoA[1] === '-' ? -1 : parseFloat(termoA[1]);
            }
            
            // Encontrar termo x (sem ser x²)
            const termoB = eq.match(/([+-]?\d*\.?\d*)x(?!2)/);
            if (termoB) {
                b = termoB[1] === '' || termoB[1] === '+' ? 1 : 
                    termoB[1] === '-' ? -1 : parseFloat(termoB[1]);
            }
            
            // Encontrar termo constante
            const termoC = eq.match(/([+-]?\d*\.?\d+)(?![x\d])/g);
            if (termoC) {
                // Pega o último número que não faz parte dos outros termos
                for (let term of termoC) {
                    if (!eq.includes(term + 'x')) {
                        c = parseFloat(term);
                    }
                }
            }
            
            return { a, b, c };
        }

        // Função principal de cálculo
        function calcular() {
            const equacao = document.getElementById('equationField').value.trim();
            
            if (!equacao) {
                mostrarErro('Por favor, digite uma equação!');
                return;
            }
            
            try {
                // Extrair coeficientes
                const { a, b, c } = extrairCoeficientes(equacao);
                
                if (a === 0) {
                    mostrarErro('O coeficiente "a" não pode ser zero! (Isso seria uma equação do 1º grau)');
                    return;
                }
                
                // Calcular delta
                const delta = Math.pow(b, 2) - (4 * a * c);
                
                // Gerar explicação detalhada
                gerarExplicacao(equacao, a, b, c, delta);
                
                // Salvar no histórico
                salvarHistorico(equacao, a, b, c, delta);
                
                // Atualizar lista de histórico
                atualizarHistorico();
                
            } catch (error) {
                mostrarErro('Formato de equação inválido! Use o formato: 2x² + 7x - 8 = 0');
            }
        }

        function gerarExplicacao(equacaoOriginal, a, b, c, delta) {
            const solutionDiv = document.getElementById('solutionContent');
            
            // Formatar números
            const formatNum = (num) => {
                if (Number.isInteger(num)) return num.toString();
                return num.toFixed(4).replace(/\.?0+$/, '');
            };
            
            // Identificar tipo de equação
            let tipoEquacao = '';
            if (b === 0 && c === 0) tipoEquacao = 'incompleta pura (b = 0 e c = 0)';
            else if (b === 0) tipoEquacao = 'incompleta (b = 0)';
            else if (c === 0) tipoEquacao = 'incompleta (c = 0)';
            else tipoEquacao = 'completa';
            
            // HTML da solução
            let html = `
                <div class="equation-display">
                    ${equacaoOriginal}
                </div>
                
                <div class="solution-card">

                    </div>

                        <p>Primeiro, vamos identificar os valores de <strong>a</strong>, <strong>b</strong> e <strong>c</strong> na equação:</p>

                        <div class="formula-box">
                            <p>📊 <strong>a</strong> = ${formatNum(a)} (coeficiente de x²)</p>
                            <p>📊 <strong>b</strong> = ${formatNum(b)} (coeficiente de x)</p>
                            <p>📊 <strong>c</strong> = ${formatNum(c)} (termo constante)</p>
                        </div>

                    </div>
                </div>
                
                <div class="solution-card">
                    <div class="step-title">

                        <p>O discriminante nos diz quantas raízes reais a equação possui:</p>
                        <p class="formula-box">Δ = b² - 4ac</p>
                        <p><strong>Substituindo os valores:</strong></p>
                        <p>Δ = (${formatNum(b)})² - 4 × (${formatNum(a)}) × (${formatNum(c)})</p>
                        <p>Δ = ${formatNum(b * b)} - ${formatNum(4 * a * c)}</p>
                        <div class="result-highlight" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <strong>Δ = ${formatNum(delta)}</strong>
                        </div>
                    </div>
                </div>
                
                <div class="solution-card">
                    <div class="step-title">
                        <span>📌</span>
                        <span>Passo 3: Analisar o discriminante</span>
                    </div>
                    <div class="step-explanation">
            `;
            
            if (delta < 0) {
                html += `
                    <p>📊 Δ = ${formatNum(delta)} <span class="highlight">(valor negativo)</span></p>
                    <p>Quando <strong>Δ < 0</strong>, a equação <strong>não possui raízes reais</strong>.</p>
                    <p>📈 Isso significa que a parábola não cruza o eixo x (não tem pontos onde y = 0).</p>
                    <div class="result-highlight" style="background: linear-gradient(135deg, #f56565 0%, #c53030 100%);">
                        ⚠️ <strong>Não existem raízes reais</strong><br>
                        <span style="font-size: 16px;">O conjunto solução é vazio: S = { }</span>
                    </div>
                `;
            } else if (delta === 0) {
                html += `
                    <p>📊 Δ = 0 <span class="highlight">(igual a zero)</span></p>
                    <p>Quando <strong>Δ = 0</strong>, a equação possui <strong>duas raízes reais e iguais</strong> (raiz dupla).</p>
                    <p>📈 Isso significa que a parábola toca o eixo x em apenas um ponto.</p>
                `;
            } else {
                html += `
                    <p>📊 Δ = ${formatNum(delta)} <span class="highlight">(valor positivo)</span></p>
                    <p>Quando <strong>Δ > 0</strong>, a equação possui <strong>duas raízes reais e diferentes</strong>.</p>
                    <p>📈 Isso significa que a parábola cruza o eixo x em dois pontos distintos.</p>
                `;
            }
            
            html += `</div></div>`;
            
            if (delta >= 0) {
                // Calcular raízes
                const x1 = (-b + Math.sqrt(delta)) / (2 * a);
                const x2 = (-b - Math.sqrt(delta)) / (2 * a);
                
                // Converter para frações
                const fracX1 = decimalParaFracao(x1);
                const fracX2 = decimalParaFracao(x2);
                
                // Análise da raiz quadrada de delta
                const raizDelta = calcularRaizFracao(delta, a);
                
                html += `
                    <div class="solution-card">
                        <div class="step-title">
                            <span>📌</span>
                            <span>Passo 4: Aplicar a Fórmula de Bhaskara</span>
                        </div>
                        <div class="step-explanation">
                            <p>A fórmula de Bhaskara nos dá as raízes:</p>
                            <p class="formula-box">x = (-b ± √Δ) / 2a</p>
                            <p><strong>Substituindo os valores:</strong></p>
                            <p>x = (-(${formatNum(b)}) ± √${formatNum(delta)}) / (2 × ${formatNum(a)})</p>
                            
                            <div class="roots-detailed">
                                <!-- Cálculo detalhado de X₁ -->
                                <div class="root-calculation">
                                    <div class="root-header">
                                        <div class="root-icon x1">X₁</div>
                                        <div><strong>Primeira raiz (com +)</strong></div>
                                    </div>
                                    <p><strong>Fórmula:</strong> x₁ = (-b + √Δ) / 2a</p>
                                    <div class="root-expression">
                                        x₁ = (-(${formatNum(b)}) + √${formatNum(delta)}) / (2 × ${formatNum(a)})
                                    </div>
                                    <p><strong>Passo a passo:</strong></p>
                                    <p>1️⃣ Calculando -b: -(${formatNum(b)}) = ${formatNum(-b)}</p>
                                    <p>2️⃣ Calculando √Δ: √${formatNum(delta)} = ${formatNum(Math.sqrt(delta))}</p>
                                    <p>3️⃣ Somando: ${formatNum(-b)} + ${formatNum(Math.sqrt(delta))} = ${formatNum(-b + Math.sqrt(delta))}</p>
                                    <p>4️⃣ Dividindo por 2a: 2 × ${formatNum(a)} = ${formatNum(2 * a)}</p>
                                    <p>5️⃣ Resultado: ${formatNum(-b + Math.sqrt(delta))} ÷ ${formatNum(2 * a)} = ${formatNum(x1)}</p>
                                    
                                    <div class="root-result-box">
                                        <div class="root-result-item">
                                            <div style="color: #718096; margin-bottom: 8px;">📟 Forma decimal</div>
                                            <div class="root-value-decimal">${formatNum(x1)}</div>
                                        </div>
                                        <div class="root-result-item">
                                            <div style="color: #718096; margin-bottom: 8px;">📏 Forma fracionária</div>
                                            <div class="root-value-fraction">
                                                ${formatarFracaoHTML(fracX1)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Cálculo detalhado de X₂ -->
                                <div class="root-calculation">
                                    <div class="root-header">
                                        <div class="root-icon x2">X₂</div>
                                        <div><strong>Segunda raiz (com -)</strong></div>
                                    </div>
                                    <p><strong>Fórmula:</strong> x₂ = (-b - √Δ) / 2a</p>
                                    <div class="root-expression">
                                        x₂ = (-(${formatNum(b)}) - √${formatNum(delta)}) / (2 × ${formatNum(a)})
                                    </div>
                                    <p><strong>Passo a passo:</strong></p>
                                    <p>1️⃣ Calculando -b: -(${formatNum(b)}) = ${formatNum(-b)}</p>
                                    <p>2️⃣ Calculando √Δ: √${formatNum(delta)} = ${formatNum(Math.sqrt(delta))}</p>
                                    <p>3️⃣ Subtraindo: ${formatNum(-b)} - ${formatNum(Math.sqrt(delta))} = ${formatNum(-b - Math.sqrt(delta))}</p>
                                    <p>4️⃣ Dividindo por 2a: 2 × ${formatNum(a)} = ${formatNum(2 * a)}</p>
                                    <p>5️⃣ Resultado: ${formatNum(-b - Math.sqrt(delta))} ÷ ${formatNum(2 * a)} = ${formatNum(x2)}</p>
                                    
                                    <div class="root-result-box">
                                        <div class="root-result-item">
                                            <div style="color: #718096; margin-bottom: 8px;">📟 Forma decimal</div>
                                            <div class="root-value-decimal">${formatNum(x2)}</div>
                                        </div>
                                        <div class="root-result-item">
                                            <div style="color: #718096; margin-bottom: 8px;">📏 Forma fracionária</div>
                                            <div class="root-value-fraction">
                                                ${formatarFracaoHTML(fracX2)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="solution-card">
                        <div class="step-title">
                            <span>📌</span>
                            <span>Passo 5: Conjunto Solução</span>
                        </div>
                        <div class="result-highlight">
                            <strong>S = { ${formatNum(x1)} ; ${formatNum(x2)} }</strong>
                        </div>
                        <div style="margin-top: 12px; text-align: center;">
                            <p style="color: #4a5568;">Ou em fração:</p>
                            <p style="font-size: 20px; font-family: 'Courier New', monospace; color: #667eea;">
                                S = { ${formatarFracaoHTML(fracX1)} ; ${formatarFracaoHTML(fracX2)} }
                            </p>

            solutionDiv.innerHTML = html;

            document.getElementById('errorMessage').style.display = 'none';
            
            // Scroll para a solução
            document.getElementById('solutionArea').scrollIntoView({ behavior: 'smooth' });

        function mostrarErro(mensagem) {
            document.getElementById('errorText').textContent = mensagem;
            document.getElementById('errorMessage').style.display = 'flex';
            document.getElementById('solutionArea').style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('errorMessage').style.display = 'none';
            }, 5000);
        }

        function salvarHistorico(equacao, a, b, c, delta) {
            const data = new Date();
            const dataStr = data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR');
            
            let raizes = [];
            if (delta >= 0) {
                const x1 = (-b + Math.sqrt(delta)) / (2 * a);
                const x2 = (-b - Math.sqrt(delta)) / (2 * a);
                raizes = [x1, x2];
            }
            
            const item = {
                id: Date.now(),
                equacao: equacao,
                a: a,
                b: b,
                c: c,
                delta: delta,
                raizes: raizes,
                data: dataStr
            };
            
            historico.unshift(item); // Adiciona no início
            
            // Limitar histórico a 20 itens
            if (historico.length > 20) {
                historico.pop();
            }
            
            // Salvar no localStorage
            localStorage.setItem('historicoEquacoes', JSON.stringify(historico));
        }

        function atualizarHistorico() {
            const historyList = document.getElementById('historyList');
            
            if (historico.length === 0) {
                historyList.innerHTML = '<div class="empty-history">Nenhum cálculo ainda<br>Resolva uma equação para começar!</div>';
                return;
            }
            
            let html = '';
            historico.forEach(item => {
                const formatNum = (num) => {
                    if (Number.isInteger(num)) return num.toString();
                    return num.toFixed(3);
                };
                
                let resultadoHtml = '';
                if (item.delta < 0) {
                    resultadoHtml = '<span style="color: #f56565;">❌ Sem raízes reais</span>';
                } else {
                    resultadoHtml = `
                        <div class="history-result">
                            x₁ = ${formatNum(item.raizes[0])}<br>
                            x₂ = ${formatNum(item.raizes[1])}
                        </div>
                    `;
                }
                
                html += `
                    <div class="history-item" onclick="carregarDoHistorico(${item.id})">
                        <div class="history-equation">${item.equacao}</div>
                        ${resultadoHtml}
                        <div class="history-roots">
                            Δ = ${formatNum(item.delta)}
                        </div>
                        <div class="history-date">${item.data}</div>
                    </div>
                `;
            });
            
            historyList.innerHTML = html;
        }

        function carregarDoHistorico(id) {
            const item = historico.find(h => h.id === id);
            if (item) {
                document.getElementById('equationField').value = item.equacao;
                calcular();
            }
        }

        function limparHistorico() {
            if (confirm('Tem certeza que deseja limpar todo o histórico?')) {
                historico = [];
                localStorage.removeItem('historicoEquacoes');
                atualizarHistorico();
            }
        }

        // Inicializar
        window.onload = function() {
            createMathBackground();
            atualizarHistorico();
            
            // Adicionar atalho Enter
            document.getElementById('equationField').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    calcular();
                }
            });
        };
    </script>
